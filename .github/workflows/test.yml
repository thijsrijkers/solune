name: Run automated Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Install dependencies
        run: go mod tidy

      - name: Run unit tests
        run: go test ./test/unit/...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services via Docker Compose
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for solune to be ready..."
          for i in $(seq 1 30); do
            if nc -z localhost 9000; then
              echo "Service is up!"
              sleep 2  # extra buffer after port is open
              exit 0
            fi
            echo "Attempt $i/30 - waiting 3s..."
            sleep 8
          done
          echo "Service failed to start. Logs:"
          docker compose logs
          exit 1

      - name: Run integration walkthrough
        run: go run ./test/integration/steps.go

      - name: Run integration tests
        run: go test ./test/integration/... -v -count=1

      - name: Tear down services
        if: always()
        run: docker compose down
